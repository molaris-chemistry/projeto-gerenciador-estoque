spring:
  application:
    name: reagentes-api

  datasource:
    url: jdbc:postgresql://localhost:5432/reagentes_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    repair: true
    validate-on-migrate: false

server:
  port: 8080

logging:
  level:
    com.reagentes: DEBUG
    org.springframework.web: DEBUG
    org.springframework.context: DEBUG

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:project}
  expiration-time-in-days: ${JWT_EXPIRATION_TIME_IN_DAYS:7}
